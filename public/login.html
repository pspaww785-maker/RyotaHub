<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>RyotaHub - Login</title>
                <style>
                        body {
                                    margin: 0;
                                                padding: 0;
                                                            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                                                                        background-color: #0b071a;
                                                                                    color: #fff;
                                                                                                display: flex;
                                                                                                            justify-content: center;
                                                                                                                        align-items: center;
                                                                                                                                    height: 100vh;
                                                                                                                                            }
                                                                                                                                                    .login-box {
                                                                                                                                                                background: #130d2a;
                                                                                                                                                                            padding: 40px;
                                                                                                                                                                                        border-radius: 12px;
                                                                                                                                                                                                    box-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
                                                                                                                                                                                                                text-align: center;
                                                                                                                                                                                                                            width: 320px;
                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                            h2 { color: #a020f0; margin-bottom: 25px; font-size: 28px; }
                                                                                                                                                                                                                                                    input {
                                                                                                                                                                                                                                                                width: 100%;
                                                                                                                                                                                                                                                                            padding: 12px;
                                                                                                                                                                                                                                                                                        margin: 10px 0;
                                                                                                                                                                                                                                                                                                    border: 1px solid #4a154b;
                                                                                                                                                                                                                                                                                                                border-radius: 6px;
                                                                                                                                                                                                                                                                                                                            background: #1c143d;
                                                                                                                                                                                                                                                                                                                                        color: #fff;
                                                                                                                                                                                                                                                                                                                                                    box-sizing: border-box;
                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                    button {
                                                                                                                                                                                                                                                                                                                                                                                width: 100%;
                                                                                                                                                                                                                                                                                                                                                                                            padding: 12px;
                                                                                                                                                                                                                                                                                                                                                                                                        background: #a020f0;
                                                                                                                                                                                                                                                                                                                                                                                                                    border: none;
                                                                                                                                                                                                                                                                                                                                                                                                                                color: white;
                                                                                                                                                                                                                                                                                                                                                                                                                                            font-weight: bold;
                                                                                                                                                                                                                                                                                                                                                                                                                                                        border-radius: 6px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    cursor: pointer;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                margin-top: 15px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            transition: 0.3s;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            button:hover { background: #bc13fe; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="login-box">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <h2>RYOTA HUB</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <form id="loginForm">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <input type="text" id="username" placeholder="Username" required>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <input type="password" id="password" placeholder="Password" required>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <button type="submit">LOGIN OWNER</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </form>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('loginForm').addEventListener('submit', async (e) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            e.preventDefault();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const username = document.getElementById('username').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const password = document.getElementById('password').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const res = await fetch('/api/login', {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            method: 'POST',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            headers: { 'Content-Type': 'application/json' },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            body: JSON.stringify({ username, password })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const data = await res.json();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if(data.success) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                window.location.href = '/';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            alert(data.message);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </html>
